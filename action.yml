name: 'AI Test Generator'
description: 'Automatically generates Playwright E2E tests based on your PR diff.'
inputs:
  GITHUB_TOKEN:
    required: true
  GROQ_API_KEY:
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install dependencies
      run: npm install && npm install -g tsx
      shell: bash
      working-directory: ${{ github.action_path }}
    - name: Run AI Test Generator
      run: npx tsx src/main.ts
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        GROQ_API_KEY: ${{ inputs.GROQ_API_KEY }}

